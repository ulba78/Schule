<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Schulkalender Editor (.ics)</title>
  <style>
    :root{
      --bg:#f7f7f8; --fg:#111; --muted:#666; --card:#fff; --border:#e6e6e9;
      --primary:#0b76ff; --danger:#c62828; --ok:#12a150;
    }
    html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.5}
    .container{max-width:1000px;margin:0 auto;padding:16px}
    h3{margin:0 0 6px 0}
    .header{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{background:#fff;border:1px solid var(--border);padding:6px 10px;border-radius:6px;cursor:pointer}
    button.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    button.danger{background:#fff;color:var(--danger);border-color:var(--danger)}
    button:disabled{opacity:.6;cursor:not-allowed}
    input,select,textarea{border:1px solid var(--border);border-radius:6px;padding:6px 8px;background:#fff;color:var(--fg)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
    .notice{font-size:.9em;color:#555;margin-bottom:6px}
    .small{font-size:.85em;color:#666}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .grow{flex:1}
    .list .item{padding:10px;border-bottom:1px solid #f0f0f2;display:grid;grid-template-columns:160px 1fr auto;gap:12px}
    .list .item:last-child{border-bottom:0}
    .time{color:#333;font-weight:600}
    .meta{color:#666;font-size:0.9em}
    .title{font-weight:700}
    .tag{display:inline-block;padding:1px 6px;border:1px solid var(--border);border-radius:999px;font-size:.8em;color:#333}
    .toolbar{display:flex;gap:8px;align-items:center;margin:8px 0 12px}
    .pill{display:inline-flex;gap:4px;border:1px solid var(--border);border-radius:999px;overflow:hidden}
    .pill button{border:0;border-right:1px solid var(--border);background:#fff}
    .pill button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .right{margin-left:auto}
    .status{padding:6px 10px;border-radius:6px;background:#eef5ff;border:1px solid #cfe1ff;font-size:.9em}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;padding:12px}
    .modal{max-width:680px;width:100%;background:#fff;border-radius:8px;border:1px solid var(--border);padding:12px}
    .modal h4{margin:4px 0 8px 0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .muted{color:#888}
    .link{color:var(--primary);text-decoration:none}
    .footer{margin-top:16px;color:#777;font-size:.85em}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h3>Schulkalender Editor (.ics)</h3>
        <div class="notice" id="sourceNotice">Bereit.</div>
      </div>
      <div class="controls">
        <button id="loadBtn">Laden</button>
        <button id="newBtn" class="primary">Neu</button>
        <button id="saveBtn">Speichern (Branch + PR)</button>
        <button id="downloadBtn">.ics herunterladen</button>
        <div class="pill" role="tablist" aria-label="Ansicht">
          <button id="viewUpcoming" class="active" aria-pressed="true">Anstehend</button>
          <button id="viewAll" aria-pressed="false">Alle</button>
        </div>
        <input id="searchInput" placeholder="Suchen (Titel/Ort/Beschr.)" />
      </div>
    </div>

    <div class="card row">
      <div class="row grow">
        <label>Owner <input id="owner" value="ulba78" /></label>
        <label>Repo <input id="repo" value="schule" /></label>
        <label>Pfad <input id="path" class="grow" value="schulkalender-2025-2026.ics" /></label>
        <label>Base-Branch <input id="baseBranch" value="main" /></label>
        <label>Feature-Branch Präfix <input id="featurePrefix" value="edit-ics/" /></label>
      </div>
      <div class="row">
        <button id="setTokenBtn">Token setzen</button>
        <button id="clearTokenBtn" class="danger">Token löschen</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="status" id="status">Status: bereit</div>
      <div class="right small">Hinweis: Token bleibt nur lokal im Browser gespeichert.</div>
    </div>

    <div class="card list" id="list"><div class="muted">Noch keine Termine geladen.</div></div>

    <div class="footer">
      Tipp: PR-Workflow ist ideal für mehrere Bearbeiter. Konflikte ggf. im PR lösen.
    </div>
  </div>

  <!-- Modal Editor -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h4 id="modalTitle">Termin bearbeiten</h4>
      <div class="grid">
        <label>Titel <input id="fTitle" /></label>
        <label>Ort <input id="fLocation" /></label>
        <label class="grid-span">Beschreibung <textarea id="fDescription" rows="3"></textarea></label>
        <label>Ganztägig <select id="fAllDay"><option value="true">Ja</option><option value="false" selected>Nein</option></select></label>
        <label>Start-Datum <input id="fStartDate" type="date" /></label>
        <label id="timeStartWrap">Start-Zeit <input id="fStartTime" type="time" step="60" /></label>
        <label>End-Datum <input id="fEndDate" type="date" /></label>
        <label id="timeEndWrap">End-Zeit <input id="fEndTime" type="time" step="60" /></label>
      </div>
      <div class="row" style="margin-top:8px">
        <span class="small muted" id="fUid"></span>
        <div class="right">
          <button id="deleteBtn" class="danger">Löschen</button>
          <button id="cancelBtn">Abbrechen</button>
          <button id="saveEventBtn" class="primary">Speichern</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
